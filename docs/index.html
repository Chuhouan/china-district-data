<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>中国行政区划数据库 | China Administrative Division Database</title>
<script src="./echarts.min.js"></script>
<script>if(typeof echarts==='undefined'){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"><\/script>');}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Design System ===== */
:root{
  --bg:#111111;
  --panel:#171717;
  --border:#303030;
  --text:#F5F5F5;
  --text-secondary:#9E9E9E;
  --text-muted:#606060;
  --accent:#D32F2F;
  --accent-hover:#C62828;
  --accent-subtle:rgba(211,47,47,0.12);
  --font-sans:'Inter','Noto Sans SC','PingFang SC',sans-serif;
  --font-mono:SFMono-Regular,Consolas,'Liberation Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}

/* ===== Layout ===== */
.app{max-width:1600px;margin:0 auto;padding:0}

/* ===== Header ===== */
.header{
  padding:28px 32px 20px;
  border-bottom:1px solid var(--border);
}
.header-badge{
  display:inline-block;
  font-size:10px;
  font-weight:600;
  letter-spacing:1.5px;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:6px;
}
.header-title{
  font-size:22px;
  font-weight:600;
  letter-spacing:-0.3px;
  color:var(--text);
  line-height:1.3;
}
.header-sub{
  font-size:13px;
  color:var(--text-secondary);
  margin-top:4px;
  font-weight:400;
}

/* ===== Stats Bar ===== */
.stats-bar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--border);
}
.stat-item{
  padding:16px 20px;
  border-right:1px solid var(--border);
  text-align:center;
}
.stat-item:last-child{border-right:none}
.stat-num{
  font-size:28px;
  font-weight:600;
  color:var(--text);
  line-height:1;
  font-feature-settings:"tnum";
}
.stat-label{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:4px;
  letter-spacing:0.5px;
}

/* ===== Toolbar ===== */
.toolbar{
  display:flex;
  align-items:center;
  gap:4px;
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
}
.toolbar-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-secondary);
  padding:5px 14px;
  font-size:12px;
  font-family:inherit;
  cursor:pointer;
  transition:all 120ms ease;
  border-radius:0;
}
.toolbar-btn:hover{
  border-color:var(--text-muted);
  color:var(--text);
}
.toolbar-btn.active{
  background:var(--accent-subtle);
  border-color:var(--accent);
  color:var(--accent);
}

/* ===== Breadcrumb Row ===== */
.breadcrumb-row{
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  font-size:12px;
  color:var(--text-secondary);
  background:var(--panel);
  min-height:36px;
}
.breadcrumb-row .bc-sep{
  color:var(--text-muted);
  font-size:10px;
}
.breadcrumb-row .bc-path{
  color:var(--text);
}
.breadcrumb-row .bc-time{
  margin-left:auto;
  color:var(--text-muted);
  font-size:11px;
}
.breadcrumb-row .bc-item{
  cursor:pointer;
  transition:color 120ms ease;
}
.breadcrumb-row .bc-item:hover{color:var(--accent)}

/* ===== Main Layout ===== */
.main-layout{
  display:flex;
  height:calc(100vh - 280px);
  min-height:500px;
}

/* ===== Left Sidebar ===== */
.left-sidebar{
  width:280px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--border);
  background:var(--panel);
  overflow:hidden;
}
.left-sidebar .sidebar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.left-sidebar .sidebar-header h3{
  font-size:12px;
  font-weight:500;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.8px;
}
.left-sidebar .sidebar-header .badge{
  font-size:10px;
  padding:2px 8px;
  border:1px solid var(--border);
  color:var(--text-muted);
  font-family:var(--font-mono);
}
.search-box{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
}
.search-input-wrap{
  position:relative;
}
.search-input-wrap::before{
  content:'';
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  width:12px;
  height:12px;
  border:1.5px solid var(--text-muted);
  border-radius:50%;
}
.search-input-wrap::after{
  content:'';
  position:absolute;
  left:20px;
  top:calc(50% + 5px);
  width:6px;
  height:1.5px;
  background:var(--text-muted);
  transform:rotate(45deg);
}
.search-box input{
  width:100%;
  padding:8px 10px 8px 28px;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  font-size:12px;
  font-family:inherit;
  outline:none;
}
.search-box input::placeholder{color:var(--text-muted)}
.search-box input:focus{border-color:var(--accent)}
.search-hint{
  font-size:10px;
  color:var(--text-muted);
  margin-top:4px;
  padding-left:2px;
}
.left-sidebar .sidebar-body{
  flex:1;
  overflow-y:auto;
  padding:8px 0;
}
.left-sidebar .sidebar-body::-webkit-scrollbar{width:4px}
.left-sidebar .sidebar-body::-webkit-scrollbar-track{background:transparent}
.left-sidebar .sidebar-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.list-title{
  font-size:11px;
  color:var(--text-muted);
  padding:8px 16px 6px;
  font-family:var(--font-mono);
}
.list-title span{color:var(--text-muted)}
.area-item{
  padding:8px 16px;
  cursor:pointer;
  border-left:2px solid transparent;
  transition:all 120ms ease;
  font-size:13px;
  color:var(--text);
}
.area-item:hover{
  background:rgba(255,255,255,0.04);
  border-left-color:var(--accent);
}
.area-item.expanded{
  background:var(--accent-subtle);
  border-left-color:var(--accent);
}
.area-item .ai-name{font-size:13px;font-weight:400}
.area-item.expanded .ai-name{color:var(--accent)}
.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--text-muted);
  font-size:12px;
}

/* ===== Map ===== */
.map-wrapper{
  flex:1;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}
#map{width:100%;height:100%}

/* ===== Right Sidebar ===== */
.right-sidebar{
  width:340px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  border-left:1px solid var(--border);
  background:var(--panel);
  overflow:hidden;
}
.right-sidebar .sidebar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.right-sidebar .sidebar-header h3{
  font-size:13px;
  font-weight:500;
  color:var(--text);
}
.right-sidebar .sidebar-header .badge{
  font-size:10px;
  padding:2px 8px;
  border:1px solid var(--border);
  color:var(--text-muted);
  font-family:var(--font-mono);
}
.right-sidebar .sidebar-body{
  flex:1;
  overflow-y:auto;
  padding:0;
}
.right-sidebar .sidebar-body::-webkit-scrollbar{width:4px}
.right-sidebar .sidebar-body::-webkit-scrollbar-track{background:transparent}
.right-sidebar .sidebar-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== Detail Panel (Gov Archive Style) ===== */
.detail-section{
  padding:16px;
}
.detail-header{
  margin-bottom:16px;
}
.detail-name{
  font-size:20px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.2px;
}
.detail-parent{
  font-size:12px;
  color:var(--text-secondary);
  margin-top:2px;
}
.detail-divider{
  border:none;
  border-top:1px solid var(--border);
  margin:12px 0;
}
.detail-field{
  padding:8px 0;
  border-bottom:1px solid rgba(48,48,48,0.5);
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}
.detail-field:last-child{border-bottom:none}
.detail-field .df-label{
  font-size:11px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.5px;
  font-family:var(--font-mono);
  flex-shrink:0;
  min-width:80px;
}
.detail-field .df-value{
  font-size:13px;
  color:var(--text);
  text-align:right;
  max-width:65%;
  word-break:break-all;
  line-height:1.5;
}
.detail-path{
  font-size:12px;
  color:var(--text-secondary);
  line-height:1.8;
}
.detail-path .dp-arrow{color:var(--text-muted);margin:0 4px}
.detail-footer{
  border-top:1px solid var(--border);
  padding:16px;
}
.detail-footer-text{
  font-size:10px;
  color:var(--text-muted);
  font-family:var(--font-mono);
  letter-spacing:0.3px;
}

/* ===== Compare ===== */
.compare-hint{
  text-align:center;
  padding:40px 20px;
  color:var(--text-muted);
  font-size:12px;
}

/* ===== History ===== */
.history-item{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  font-size:12px;
}
.history-item .hi-type{
  display:inline-block;
  padding:1px 6px;
  font-size:10px;
  margin-right:6px;
  font-family:var(--font-mono);
}
.hi-success{color:#4caf50;border:1px solid rgba(76,175,80,0.3)}
.hi-error{color:#f44336;border:1px solid rgba(244,67,54,0.3)}
.hi-info{color:#2196f3;border:1px solid rgba(33,150,243,0.3)}
.hi-start{color:#ff9800;border:1px solid rgba(255,152,0,0.3)}
.history-item .hi-time{color:var(--text-muted);font-size:11px}
.history-item .hi-detail{color:var(--text-secondary);margin-top:2px;font-size:11px}

/* ===== Responsive ===== */
@media(max-width:960px){
  .main-layout{flex-direction:column;height:auto}
  .left-sidebar,.right-sidebar{width:100%;max-height:200px}
  .map-wrapper{height:400px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">

<!-- ========== HEADER ========== -->
<div class="header">
  <div class="header-badge">China Administrative Division Database</div>
  <div class="header-title">中华人民共和国行政区划数据库</div>
  <div class="header-sub">覆盖全国县级以上行政区划 · 数据更新至2026年</div>
</div>

<!-- ========== STATS ========== -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-num">34</div><div class="stat-label">省级行政区</div></div>
  <div class="stat-item"><div class="stat-num">333</div><div class="stat-label">地级行政区</div></div>
  <div class="stat-item"><div class="stat-num">2800+</div><div class="stat-label">县级行政区</div></div>
  <div class="stat-item"><div class="stat-num">100%</div><div class="stat-label">数据覆盖率</div></div>
</div>

<!-- ========== TOOLBAR ========== -->
<div class="toolbar">
  <button class="toolbar-btn active" id="modeProvince" onclick="setMapMode('province')">省级</button>
  <button class="toolbar-btn" id="modeCity" onclick="setMapMode('city')">地级</button>
  <span style="flex:1"></span>
  <button class="toolbar-btn" id="labelToggle" onclick="toggleLabels()">地名</button>
  <button class="toolbar-btn" id="compareToggle" onclick="toggleCompare()">对比</button>
  <button class="toolbar-btn" id="historyToggle" onclick="toggleHistory()">记录</button>
  <button class="toolbar-btn" id="darkToggle" onclick="toggleDark()">亮色</button>
</div>

<!-- ========== BREADCRUMB ========== -->
<div class="breadcrumb-row" id="breadcrumb">
  <span class="bc-path">中国</span>
</div>

<!-- ========== MAIN LAYOUT ========== -->
<div class="main-layout">

  <!-- LEFT SIDEBAR -->
  <div class="left-sidebar">
    <div class="sidebar-header">
      <h3 id="leftPanelTitle">省级列表</h3>
      <span class="badge" id="leftPanelBadge">省级</span>
    </div>
    <div class="search-box">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="搜索行政区名称或代码..." oninput="searchList(this.value)">
      </div>
      <div class="search-hint" id="searchHint">2863 administrative units indexed</div>
    </div>
    <div class="sidebar-body" id="leftPanelContent">
      <div class="empty-state">正在加载数据...</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrapper"><div id="map"></div></div>

  <!-- RIGHT SIDEBAR -->
  <div class="right-sidebar">
    <div class="sidebar-header">
      <h3 id="rightPanelTitle">地区详情</h3>
      <span class="badge" id="rightPanelBadge"></span>
    </div>
    <div class="sidebar-body" id="rightPanelContent">
      <div class="empty-state">点击地图或列表中的区域查看详情</div>
    </div>
  </div>

</div>
</div>

// ========== 数据加载 ==========
var apiBase = window.location.origin;
var lastUpdateTime = null;

async function loadApiData() {
  try {
    var resp = await fetch(apiBase + '/api/all');
    if (resp.ok) {
      var json = await resp.json();
      if (json.code === 0 && json.data) { mergeData(json.data); lastUpdateTime = json.data.lastUpdate; return; }
    }
  } catch (e) {}
  try {
    var sresp = await fetch('./scraped_data.json');
    if (sresp.ok) { var sjson = await sresp.json(); mergeData(sjson); lastUpdateTime = sjson.lastUpdate; }
  } catch (e) {}
}

function mergeData(data) {
  if (data.provinces) { for (var k in data.provinces) { if (data.provinces[k] && data.provinces[k].n) { D[k] = Object.assign(D[k] || {}, data.provinces[k]); } } }
  if (data.cities) { for (var k in data.cities) { if (data.cities[k] && data.cities[k].n) { C[k] = Object.assign(C[k] || {}, data.cities[k]); } } }
}

function gd(a,t){return t==='province'?D[a]:(t==='city'||t==='county'?C[a]:CY[a]);}

function getLevelLabel(code){
  if(code==='100000')return '国家';
  if(code.substring(2)==='0000')return '省级';
  if(code.substring(4)==='00')return '地级';
  return '县级';
}
function getLevelName(code){
  if(code==='100000')return 'country';
  if(code.substring(2)==='0000')return 'province';
  if(code.substring(4)==='00')return 'city';
  return 'county';
}

function updateBreadcrumb(a,n,t){
  var el=document.getElementById('breadcrumb');
  var html='<span class="bc-item bc-path" onclick="toHome()">中国</span>';
  if(a){
    var parts=[];
    var pa=a.substring(0,2)+'0000';
    if(a!==pa&&getLevelName(a)==='county'){
      if(D[pa])parts.push({c:pa,n:D[pa].n});
      else parts.push({c:pa,n:''});
      if(C[a.substring(0,4)+'00'])parts.push({c:a.substring(0,4)+'00',n:C[a.substring(0,4)+'00'].n});
      else parts.push({c:a.substring(0,4)+'00',n:''});
      parts.push({c:a,n:n});
    }else if(getLevelName(a)==='city'||(a.substring(2)!=='0000'&&a.substring(4)==='00')){
      if(D[pa])parts.push({c:pa,n:D[pa].n});
      else parts.push({c:pa,n:''});
      parts.push({c:a,n:n});
    }else if(getLevelName(a)==='province'){
      parts.push({c:a,n:n});
    }
    for(var i=0;i<parts.length;i++){
      html+='<span class="bc-sep">\u203a</span>';
      html+='<span class="bc-item" onclick="handleClick(\''+parts[i].c+'\',\''+(parts[i].n||'')+'\')">'+(parts[i].n||parts[i].c)+'</span>';
    }
  }
  if(lastUpdateTime){
    var d=new Date(lastUpdateTime);
    html+='<span class="bc-time">更新: '+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+'</span>';
  }
  el.innerHTML=html;
}

  if(d.seat)h+='<div class="detail-field"><span class="df-label">驻地</span><span class="df-value">'+d.seat+'</span></div>';
  if(d.sec||d.gov||d.rd||d.cppcc){
    h+='<hr class="detail-divider">';
    var secLabel='书记',govLabel='首长';
    if(t==='province'||levelLabel==='省级'){
      if(n.indexOf('自治区')>=0||n==='广西'||n==='内蒙古'||n==='西藏'||n==='宁夏'||n==='新疆'){secLabel='自治区党委书记';govLabel='自治区主席';}
      else if(n.indexOf('市')>=0&&(n.indexOf('北京')>=0||n.indexOf('天津')>=0||n.indexOf('上海')>=0||n.indexOf('重庆')>=0)){secLabel='市委书记';govLabel='市长';}
      else if(n.indexOf('省')>=0){secLabel='省委书记';govLabel='省长';}
      else if(n.indexOf('香港')>=0||n.indexOf('澳门')>=0){secLabel='行政长官';govLabel='行政长官';}
    }else if(t==='city'||levelLabel==='地级'){
      if(n.indexOf('自治州')>=0||n.indexOf('州')>=0){secLabel='州委书记';govLabel='州长';}
      else if(n.indexOf('盟')>=0){secLabel='盟委书记';govLabel='盟长';}
      else if(n.indexOf('地区')>=0){secLabel='地委书记';govLabel='行署专员';}
      else{secLabel='市委书记';govLabel='市长';}
    }else if(levelLabel==='县级'){
      if(n.indexOf('区')>=0&&n.indexOf('市')<0){secLabel='区委书记';govLabel='区长';}
      else if(n.indexOf('县')>=0||n.indexOf('旗')>=0){secLabel='县委书记';govLabel='县长';}
      else if(n.indexOf('市')>=0){secLabel='市委书记';govLabel='市长';}
    }
    if(d.sec)h+='<div class="detail-field"><span class="df-label">'+secLabel+'</span><span class="df-value">'+d.sec+'</span></div>';
    if(d.secDep)h+='<div class="detail-field"><span class="df-label">副'+secLabel.replace('书记','')+'副书记</span><span class="df-value">'+d.secDep+'</span></div>';
    if(d.gov)h+='<div class="detail-field"><span class="df-label">'+govLabel+'</span><span class="df-value">'+d.gov+'</span></div>';
    if(d.govDep)h+='<div class="detail-field" style="flex-wrap:wrap"><span class="df-label">副'+govLabel+'</span><span class="df-value" style="max-width:65%;text-align:right;word-break:break-all">'+d.govDep+'</span></div>';
    if(d.rd)h+='<div class="detail-field"><span class="df-label">人大常委会主任</span><span class="df-value">'+d.rd+'</span></div>';
    if(d.cppcc)h+='<div class="detail-field"><span class="df-label">政协主席</span><span class="df-value">'+d.cppcc+'</span></div>';
  }
  h+='<hr class="detail-divider">'+
    '<div class="detail-path">';
  h+='<span class="bc-path">中国</span>';
  if(pc){h+='<span class="dp-arrow">\u2192</span><span>'+pc+'</span>';}
  if(cc){h+='<span class="dp-arrow">\u2192</span><span>'+cc+'</span>';}
  h+='<span class="dp-arrow">\u2192</span><span>'+d.n+'</span>';
  h+='</div></div>'+
    '<div class="detail-footer"><div class="detail-footer-text">China Administrative Division Database</div></div>';
  el.innerHTML=h;
  updateBreadcrumb(a,n,t);
}

// ========== 地图渲染 ==========
function setMapMode(mode){
  currentMode=mode;
  document.getElementById('modeProvince').className='toolbar-btn'+(mode==='province'?' active':'');
  document.getElementById('modeCity').className='toolbar-btn'+(mode==='city'?' active':'');
  expandedProvinces={};
  expandedCities={};
  if(mode==='province'){
    if(chinaGeo)renderAll();
  }else if(mode==='city'){
    if(cityGeo){renderAll();return;}
    fetch('./china_cities.json').then(function(r){if(!r.ok)throw Error('');return r.json();}).then(function(gd){cityGeo=gd;renderAll();}).catch(function(){
      fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full_city.json').then(function(r2){if(!r2.ok)throw Error('');return r2.json();}).then(function(gd2){cityGeo=gd2;renderAll();}).catch(function(){loadAllCitiesGeo();});
    });
  }
}

function loadAllCitiesGeo(){
  if(!chinaGeo)return;
  document.getElementById('rightPanelContent').innerHTML='<div class="empty-state">正在加载全国市级数据...</div>';
  var muniAdcodes={'110000':1,'120000':1,'310000':1,'500000':1};
  var muniFeats=[],loadAdcodes=[];
  for(var i=0;i<chinaGeo.features.length;i++){
    var f=chinaGeo.features[i],a=String(f.properties.adcode||f.properties.id||''),aname=f.properties.name||'';
    if((a==='110000'||a==='120000'||a==='310000'||a==='500000')||aname==='北京市'||aname==='天津市'||aname==='上海市'||aname==='重庆市'){muniFeats.push(f);}
    else if(a&&a.length===6&&a.substring(2)==='0000'){loadAdcodes.push(a);}
  }
  var allFeats=[],done=0,total=loadAdcodes.length;
  function loadNext(idx){
    if(idx>=total){var finalFeats=muniFeats.slice().concat(allFeats);cityGeo={type:'FeatureCollection',features:finalFeats};renderAll();return;}
    fetch('https://geo.datav.aliyun.com/areas_v3/bound/'+loadAdcodes[idx]+'_full.json').then(function(r){if(r.ok)return r.json();return null;}).then(function(gd){if(gd&&gd.features)allFeats=allFeats.concat(gd.features);done++;if(done%5===0||done===total){document.getElementById('rightPanelContent').innerHTML='<div class="empty-state">加载市级数据 '+done+'/'+total+'...</div>';}loadNext(idx+1);}).catch(function(){done++;loadNext(idx+1);});
  }
  if(total>0)loadNext(0);
  else{var finalFeats=muniFeats.slice();cityGeo={type:'FeatureCollection',features:finalFeats};renderAll();}
}

function buildFeatures(){
  var src=currentMode==='city'&&cityGeo?cityGeo:chinaGeo;
  if(!src)return [];
  var feats=[];
  for(var i=0;i<src.features.length;i++)feats.push(src.features[i]);
  for(var prov in expandedProvinces){var cfs=expandedProvinces[prov];if(cfs&&cfs.length>0){for(var j=0;j<cfs.length;j++)feats.push(cfs[j]);}}
  for(var city in expandedCities){var cdfs=expandedCities[city];if(cdfs&&cdfs.length>0){for(var k=0;k<cdfs.length;k++)feats.push(cdfs[k]);}}
  return feats;
}

function expandProvince(pa){
  if(expandedProvinces[pa])return Promise.resolve(expandedProvinces[pa]);
  if(window._chinaCities)return Promise.resolve(expandProvinceLocal(pa));
  return fetch('./china_cities.json').then(function(r){if(!r.ok)throw Error('');return r.json();}).then(function(gd){window._chinaCities=gd;return expandProvinceLocal(pa);}).catch(function(){return null;});
}
function expandProvinceLocal(pa){
  if(!window._chinaCities)return null;
  var prefix=pa.substring(0,2);
  var feats=window._chinaCities.features.filter(function(f){var a=String(f.properties.adcode||f.properties.id||'');return a.substring(0,2)===prefix&&a!==pa&&a.substring(2)!=='0000'&&a.substring(4)==='00';});
  expandedProvinces[pa]=feats;
  return feats;
}

function expandCity(ca){
  if(expandedCities[ca])return Promise.resolve(expandedCities[ca]);
  return fetch('https://geo.datav.aliyun.com/areas_v3/bound/'+ca+'_full.json').then(function(r){if(!r.ok)throw Error('');return r.json();}).then(function(gd){expandedCities[ca]=gd.features||[];return expandedCities[ca];}).catch(function(){return loadCountiesFromLocal(ca);});
}

function loadCountiesFromLocal(ca){
  if(window._counties){return Promise.resolve(filterCounties(ca));}
  return fetch('./china_counties.json?v=2').then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.json();}).then(function(gd){window._counties=gd;return filterCounties(ca);}).catch(function(){return null;});
}

function filterCounties(ca){
  if(!window._counties)return null;
  var feats=window._counties.features.filter(function(f){return f._c===ca;});
  if(feats.length>0)expandedCities[ca]=feats;
  return feats.length>0?feats:null;
}

function renderAll(){
  if(!chart && typeof echarts!=='undefined'){try{chart=echarts.init(document.getElementById('map'));window.addEventListener('resize',function(){if(chart)chart.resize();});}catch(e){}}
  var geoData=currentMode==='city'&&cityGeo?cityGeo:chinaGeo;
  if(!chart){renderSidebar();return;}
  if(!geoData){renderSidebar();return;}
  var feats=buildFeatures();
  var md={type:'FeatureCollection',features:feats};
  try{echarts.registerMap('m',md);}catch(e){}
  var regions=feats.map(function(f){var p=f.properties||{};return{a:String(p.adcode||p.id||''),n:p.name||''};}).filter(function(r){return r.n;});
  var expandedKeys={};
  for(var p in expandedProvinces){expandedKeys[p]=1;expandedProvinces[p].forEach(function(f){expandedKeys[String(f.properties.adcode||f.properties.id||'')]=1;});}
  for(var c in expandedCities){expandedKeys[c]=1;expandedCities[c].forEach(function(f){expandedKeys[String(f.properties.adcode||f.properties.id||'')]=1;});}
  
  // Map colors - dark professional theme
  var isDark=document.body.classList.contains('dark');
  
  var data=regions.map(function(r){
    var isExp=!!expandedKeys[r.a];
    var pv=r.a.substring(2)==='0000',ct=(!pv&&r.a.substring(4)==='00');
    var isSelected=(r.a===selectedAdcode);
    
    if(isSelected){
      return {
        name:r.n,adcode:r.a,
        itemStyle:{
          areaColor:isDark?'rgba(211,47,47,0.18)':'rgba(211,47,47,0.12)',
          borderColor:'#D32F2F',
          borderWidth:2.5
        }
      };
    }
    if(isExp){
      // Hide parent label
      if((pv&&expandedProvinces[r.a])||(ct&&expandedCities[r.a])){
        return {name:r.n,adcode:r.a,itemStyle:{borderColor:'#D32F2F',borderWidth:1.5},label:{show:true,fontSize:0,color:'transparent'}};
      }
      // Child regions get orange border
      return {name:r.n,adcode:r.a,itemStyle:{borderColor:'#E65100',borderWidth:1.2}};
    }else{
      var bc='#404040',bw=1.0;
      if(pv){bc='#505050';bw=1.2;}
      return {name:r.n,adcode:r.a,itemStyle:{borderColor:bc,borderWidth:bw}};
    }
  });
  
  // Force labels for expanded children
  for(var i=0;i<data.length;i++){
    var di=data[i];
    if(di.adcode&&expandedKeys[di.adcode]){
      var apv=di.adcode.substring(2)==='0000',act=(!apv&&di.adcode.substring(4)==='00');
      var isParent=(apv&&expandedProvinces[di.adcode])||(act&&expandedCities[di.adcode]);
      if(!isParent){
        di.label={show:true,fontSize:Math.max(8,Math.round(8+currentZoom*0.6)),fontWeight:'bold',color:'#F5F5F5'};
      }
    }
  }
  
  try{echarts.registerMap('m',{type:'FeatureCollection',features:feats});}catch(e){}
  var curCenter=null;var curZoom=null;
  try{var opt=chart.getOption();if(opt&&opt.series&&opt.series[0]){if(opt.series[0].zoom!=null)curZoom=opt.series[0].zoom;if(opt.series[0].center)curCenter=opt.series[0].center;}}catch(e){}
  
  chart.setOption({
    backgroundColor:'#111111',
    tooltip:{trigger:'item',backgroundColor:'rgba(23,23,23,0.96)',borderColor:'#303030',borderWidth:1,textStyle:{color:'#F5F5F5',fontSize:12},formatter:function(p){if(!p.data)return'';return'<b>'+p.name+'</b>';}},
    series:[{
      type:'map',map:'m',roam:true,center:curCenter||[104,35],zoom:curZoom||4,selectedMode:false,
      label:{show:showLabels,color:'#9E9E9E',fontSize:Math.max(7,Math.round(8+currentZoom*0.6)),fontWeight:'normal',fontFamily:'Inter,"Noto Sans SC",sans-serif',formatter:function(p){return p.name;}},
      itemStyle:{areaColor:'#1A1A1A',borderColor:'#404040',borderWidth:1.0},
      emphasis:{label:{color:'#F5F5F5',fontWeight:'bold',fontSize:Math.max(9,Math.round(10+currentZoom*0.8))},itemStyle:{areaColor:'rgba(211,47,47,0.25)',borderColor:'#C62828',borderWidth:2}},
      data:data,animationDuration:120
    }]
  },true);
  chart.off('click');
  chart.on('click',function(p){if(!p.data||!p.data.adcode)return;handleClick(String(p.data.adcode),p.name);});
  renderSidebar();
}

function renderSidebar(){
  var src=currentMode==='city'&&cityGeo?cityGeo:chinaGeo;
  var modeLabels={'province':'省级','city':'地级'};
  var allP=[];
  if(src){for(var i=0;i<src.features.length;i++){var pf=src.features[i],pa=String(pf.properties.adcode||pf.properties.id||''),pn=pf.properties.name||'';if(pn)allP.push({a:pa,n:pn});}}
  if(currentMode==='city'){var seen={};for(var i=0;i<allP.length;i++)seen[allP[i].a]=1;for(var k in C){if(!seen[k]&&C[k]&&C[k].n){allP.push({a:k,n:C[k].n});}}}
  document.getElementById('leftPanelTitle').textContent=modeLabels[currentMode]+'列表';
  document.getElementById('leftPanelBadge').textContent=modeLabels[currentMode];
  var ph='<div class="list-title">'+(currentMode==='province'?'PROVINCES':'PREFECTURES')+' <span>('+allP.length+')</span></div>';
  for(var i=0;i<allP.length;i++){var pv=allP[i],ie=!!expandedProvinces[pv.a];var iec=!!expandedCities[pv.a];ph+='<div class="area-item'+(ie||iec?' expanded':'')+'" onclick="handleClick(\''+pv.a+'\',\''+pv.n+'\')"><div class="ai-name">'+(ie||iec?'\u25BC ':'')+pv.n+'</div></div>';
    if(ie&&expandedProvinces[pv.a]){var cfs=expandedProvinces[pv.a];for(var ci=0;ci<cfs.length;ci++){var cf=cfs[ci],ca2=String(cf.properties.adcode||cf.properties.id||''),cn2=cf.properties.name||'';if(cn2&&ca2!==pv.a){ph+='<div class="area-item" style="padding:6px 16px 6px 28px;font-size:12px;color:var(--text-secondary)" onclick="handleClick(\''+ca2+'\',\''+cn2+'\')"><div class="ai-name">'+cn2+'</div></div>';}}}
    if(iec&&expandedCities[pv.a]){var cdfs=expandedCities[pv.a];for(var ci2=0;ci2<cdfs.length;ci2++){var cdf=cdfs[ci2],ca3=String(cdf.properties.adcode||cdf.properties.id||''),cn3=cdf.properties.name||'';if(cn3&&ca3!==pv.a){ph+='<div class="area-item" style="padding:6px 16px 6px 28px;font-size:12px;color:var(--text-secondary)" onclick="handleClick(\''+ca3+'\',\''+cn3+'\')"><div class="ai-name">'+cn3+'</div></div>';}}}
  }
  document.getElementById('leftPanelContent').innerHTML=ph;
  cachedListHtml=ph;
  document.getElementById('searchInput').value='';
  document.getElementById('searchInput').placeholder=currentMode==='province'?'搜索省份名称或代码...':'搜索地级行政区名称或代码...';
}

function toggleProvince(a,n){
  var pa=a.substring(0,2)+'0000';
  showDetail(a,n,'province');
  var muni={'110000':1,'120000':1,'310000':1,'500000':1};
  if(muni[pa]){for(var p in expandedProvinces){delete expandedProvinces[p];}for(var c in expandedCities){delete expandedCities[c];}renderAll();return;}
  if(expandedProvinces[pa]){delete expandedProvinces[pa];for(var c in expandedCities){if(c.substring(0,2)===pa.substring(0,2))delete expandedCities[c];}renderAll();return;}
  for(var p in expandedProvinces){delete expandedProvinces[p];}for(var c in expandedCities){delete expandedCities[c];}
  expandProvince(pa).then(function(){renderAll();});
}

function handleClick(ca,cn){
  var ip=(ca.substring(2)==='0000'),pa=ca.substring(0,2)+'0000';
  if(currentMode==='province'){
    selectedAdcode=ca;
    if(ip){toggleProvince(ca,cn);}else{showDetail(ca,cn,'city');renderAll();}
    return;
  }
  if(currentMode==='city'){
    selectedAdcode=ca;
    var muni={'110000':1,'120000':1,'310000':1,'500000':1};
    var isCity=(ca.substring(2)!=='00'&&ca.substring(4)==='00');
    var isMuni=!!muni[ca];
    if(isCity||isMuni){
      showDetail(ca,cn,'city');
      if(expandedCities[ca]){delete expandedCities[ca];renderAll();}else{for(var cc in expandedCities){delete expandedCities[cc];}expandCity(ca).then(function(){renderAll();});}
      return;
    }
    showDetail(ca,cn,'city');
    renderAll();
    return;
  }
}

async function toHome(){

function toggleHistory(){
  var el=document.getElementById('rightPanelContent');
  document.getElementById('rightPanelTitle').textContent='更新记录';
  document.getElementById('rightPanelBadge').textContent='';
  el.innerHTML='<div class="empty-state">正在加载...</div>';
  fetch(apiBase+'/api/history').then(function(r){return r.json();}).then(function(json){
    if(json.code!==0||!json.data||json.data.length===0){el.innerHTML='<div class="empty-state">暂无更新记录</div>';return;}
    var html='';
    for(var i=0;i<json.data.length;i++){
      var h=json.data[i];
      var typeClass='hi-info';
      if(h.type.indexOf('success')>=0)typeClass='hi-success';
      else if(h.type.indexOf('error')>=0||h.type.indexOf('fail')>=0)typeClass='hi-error';
      else if(h.type.indexOf('start')>=0)typeClass='hi-start';
      var d=new Date(h.time);
      var ts=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours()+':'+d.getMinutes()+':'+d.getSeconds();
      var typeLabel=h.type.replace('scrape_','').replace('auto_','自动').replace('server_','系统');
      html+='<div class="history-item"><span class="hi-type '+typeClass+'">'+typeLabel+'</span><span class="hi-time">'+ts+'</span><div class="hi-detail">'+(h.details||'')+'</div>';
      if(h.source&&h.source.length>0){for(var si=0;si<h.source.length;si++){var src=h.source[si];if(typeof src==='string')html+='<div class="hi-detail" style="font-size:11px">\uD83D\uDCCE '+src+'</div>';else if(src.url)html+='<div class="hi-detail" style="font-size:11px">\uD83D\uDCCE '+src.name+'</div>';}}
      if(h.results&&h.results.length>0){html+='<div style="margin-top:4px;max-height:100px;overflow-y:auto;font-size:11px">';var maxShow=Math.min(h.results.length,30);for(var ri=0;ri<maxShow;ri++){var r=h.results[ri];html+='<div style="padding:1px 0">\u00B7 '+r.type+' '+r.name+'</div>';}if(h.results.length>maxShow)html+='<div style="color:var(--text-muted)">...还有'+(h.results.length-maxShow)+'条</div>';html+='</div>';}
      html+='</div>';
    }
    el.innerHTML=html;
  }).catch(function(){el.innerHTML='<div class="empty-state">加载失败</div>';});
}

function toggleCompare(){
  compareMode=!compareMode;
  var btn=document.getElementById('compareToggle');
  btn.textContent=compareMode?'退出对比':'对比';
  compareItems=[];
  if(compareChart){if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});else compareChart.dispose();compareChart=null;}

}
function resetCompare(){
  compareItems=[];if(compareChart){if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});else compareChart.dispose();compareChart=null;}renderCompare();
}
function addCompareItem(a,n,t){
  if(!compareMode)return;var d=gd(a,t);if(!d)d={n:n,p:'--',a:'--',g:'--'};compareItems.push({a:a,n:n,t:t,d:d});if(compareItems.length>2)compareItems.shift();renderCompare();
}
function renderCompare(){
  var el=document.getElementById('rightPanelContent');
  if(compareItems.length===0){el.innerHTML='<div class="compare-hint">点击两个省份/城市进行对比</div>';if(compareChart){if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});else compareChart.dispose();compareChart=null;}return;}
  if(compareItems.length===1){var d=compareItems[0].d;el.innerHTML='<div style="padding:16px"><div style="text-align:center;font-size:16px;font-weight:600;margin-bottom:16px">'+d.n+'</div><div style="text-align:center"><button class="toolbar-btn" onclick="resetCompare()">重置</button></div><div class="compare-hint">请再点击另一个省份/城市</div></div>';if(compareChart){if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});else compareChart.dispose();compareChart=null;}return;}
  var d1=compareItems[0].d,d2=compareItems[1].d;
  function parseVal(v){if(!v||v==='--')return 0;var s=v.replace(/[万亿km2万,]/g,'');var n=parseFloat(s);if(v.indexOf('万')>-1&&v.indexOf('km2')===-1&&v.indexOf('万亿')===-1)n=n*10000;if(v.indexOf('万亿')>-1)n=n*10000;if(v.indexOf('亿')>-1&&v.indexOf('万亿')===-1)n=n*100000000;return n||0;}
  el.innerHTML='<div id="comparePop" style="width:100%;height:130px"></div><div id="compareArea" style="width:100%;height:130px"></div><div id="compareGdp" style="width:100%;height:130px"></div><div style="text-align:center;padding:8px"><button class="toolbar-btn" onclick="resetCompare()">重置</button></div>';
  if(compareChart)compareChart.dispose();
  compareChart=[];
  function makeChart(id,title,v1,v2){var c=echarts.init(document.getElementById(id));c.setOption({tooltip:{trigger:'item',formatter:function(p){return p.name+'<br/>'+p.value;}},grid:{left:50,right:10,top:25,bottom:20},xAxis:{type:'category',data:[d1.n,d2.n],axisLabel:{color:'#9E9E9E',fontSize:10}},yAxis:{type:'value',axisLabel:{color:'#9E9E9E',fontSize:9}},title:{text:title,textStyle:{color:'#F5F5F5',fontSize:12},left:'center'},series:[{type:'bar',data:[{value:v1,itemStyle:{color:'#D32F2F'}},{value:v2,itemStyle:{color:'#9E9E9E'}}],barWidth:20}]});compareChart.push(c);}
  makeChart('comparePop','人口',parseVal(d1.p),parseVal(d2.p));
  makeChart('compareArea','面积',parseVal(d1.a),parseVal(d2.a));
  makeChart('compareGdp','GDP',parseVal(d1.g),parseVal(d2.g));
}
function searchList(val){
  var el=document.getElementById('leftPanelContent');
  if(!val){el.innerHTML=cachedListHtml;return;}
  var items=el.querySelectorAll('.area-item');
  var kw=val.trim().toLowerCase();
  for(var i=0;i<items.length;i++){var txt=items[i].textContent.toLowerCase();items[i].style.display=txt.indexOf(kw)>-1?'':'none';}
}
function toggleLabels(){
  showLabels=!showLabels;
  var btn=document.getElementById('labelToggle');
  btn.textContent=showLabels?'地名':'隐藏';
  if(chart){renderAll();}
}
function toggleDark(){
  var b=document.body;
  b.classList.toggle('dark');
  var btn=document.getElementById('darkToggle');
  btn.textContent=b.classList.contains('dark')?'\u2600\uFE0F 亮色':'\uD83C\uDF19 暗色';
  if(chart){renderAll();}
}
</script>
</body>
</html>
