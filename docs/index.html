.main-layout{display:flex}

.left-sidebar .sidebar-header h3{font-size:14px;font-weight:600;color:#1a1a2e}
.left-sidebar .sidebar-header .badge{font-size:11px;padding:2px 10px;border-radius:2px;background:#eef0f4;color:#6a7090;border:1px solid #d8dce4}
.search-box{width:100%;padding:8px 18px;border-bottom:1px solid #e8ecf0}
.search-box input{width:100%;padding:6px 10px;border:1px solid #d8dce4;border-radius:2px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#1a1a2e}
.search-box input:focus{border-color:#4a5070}
body.dark .search-box{border-bottom-color:#30363d}

.left-sidebar .sidebar-body{flex:1;overflow-y:auto;min-height:0;padding:14px 18px}

.left-sidebar .sidebar-body::-webkit-scrollbar-thumb{background:#c8cce0;border-radius:2px}
.map-wrapper{flex:1;position:relative;min-width:0;overflow:hidden;height:720px;background:#fff}
#map{width:100%;height:100%}
.right-sidebar{width:360px;flex-shrink:0;background:#fafbfc;display:flex;flex-direction:column;max-height:720px;overflow:hidden;border-left:1px solid #e8ecf0}

.right-sidebar .sidebar-header h3{font-size:14px;font-weight:600;color:#1a1a2e}
.right-sidebar .sidebar-header .badge{font-size:11px;padding:2px 10px;border-radius:2px;background:#eef0f4;color:#6a7090;border:1px solid #d8dce4}
.right-sidebar .sidebar-body{flex:1;overflow-y:auto;min-height:0;padding:14px 18px}
.right-sidebar .sidebar-body::-webkit-scrollbar{width:4px}

.detail-card .dc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f2f6;font-size:13px}
.detail-card .dc-row:last-child{border-bottom:none}
.detail-card .dc-label{color:#6a7090}
.detail-card .dc-value{color:#1a1a2e;font-weight:500;text-align:right;max-width:60%}

.compare-card .cc-side{flex:1;background:#fff;border:1px solid #e8ecf0;border-radius:2px;padding:12px}
.compare-card .cc-side:first-child{border-right:none;border-radius:2px 0 0 2px}
.compare-card .cc-side:last-child{border-left:none;border-radius:0 2px 2px 0}
.compare-card .cc-title{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1a1a2e;text-align:center}
.compare-card .cc-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f2f6;font-size:12px}
.compare-card .cc-row:last-child{border-bottom:none}
.compare-card .cc-label{color:#6a7090}
.compare-card .cc-value{color:#1a1a2e;font-weight:500;text-align:right;max-width:55%}
.compare-hint{text-align:center;padding:20px;color:#b0b8c8;font-size:13px}
body.dark .compare-card .cc-side{background:#161b22;border-color:#30363d}
body.dark .compare-card .cc-title{color:#c9d1d9;border-bottom-color:#30363d}

body.dark .compare-card .cc-label{color:#8b949e}
body.dark .compare-card .cc-value{color:#c9d1d9}
body.dark .compare-hint{color:#484f58}

.history-item{padding:10px 0;border-bottom:1px solid #f0f2f6;font-size:12px}
.history-item:last-child{border-bottom:none}
.history-item .hi-type{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;margin-right:6px}
.hi-success{background:#d4edda;color:#155724}
.hi-error{background:#f8d7da;color:#721c24}
.hi-info{background:#d1ecf1;color:#0c5460}
.hi-start{background:#fff3cd;color:#856404}
.history-item .hi-time{color:#8890a0;font-size:11px}
.history-item .hi-detail{color:#4a5070;margin-top:2px}
body.dark .history-item{border-bottom-color:#21262d}
body.dark .history-item .hi-time{color:#6a7090}
body.dark .history-item .hi-detail{color:#8b949e}
body.dark .hi-success{background:#1e3a2f;color:#7ecb8e}
body.dark .hi-error{background:#3a1e1e;color:#ff7b7b}
body.dark .hi-info{background:#1e2a3a;color:#7bb8ff}

.list-title span{color:#b0b8c8;font-weight:400}
.area-item{background:#fff;border:1px solid #e8ecf0;border-radius:2px;padding:12px 14px;margin-bottom:6px;cursor:pointer}
.area-item:hover{background:#f5f7fa;border-color:#c8cce0}

.area-item .ai-sub{font-size:12px;color:#8890a0;margin-top:2px}
.empty-state{text-align:center;padding:60px 20px;color:#b0b8c8}
.empty-state p{font-size:13px}
.section-title{font-size:12px;font-weight:600;color:#6a7090;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid #e8ecf0}

// ========== 数据加载（静态/API 双模式） ==========
var apiBase = window.location.origin;
var lastUpdateTime = null;

async function loadApiData() {
  // 先尝试API（本地开发用）
  try {
    var resp = await fetch(apiBase + '/api/all');
    if (resp.ok) {
      var json = await resp.json();
      if (json.code === 0 && json.data) {
        mergeData(json.data);
        lastUpdateTime = json.data.lastUpdate;
        console.log('✓ API数据已加载, 城市:', Object.keys(C).length);
        return;
      }
    }
  } catch (e) { console.log('API不可用，尝试静态JSON...'); }

  // 回退：直接加载scraped_data.json（GitHub Pages用）
  try {
    var sresp = await fetch('./scraped_data.json');
    if (sresp.ok) {
      var sjson = await sresp.json();
      mergeData(sjson);
      lastUpdateTime = sjson.lastUpdate;
      console.log('✓ 静态JSON已加载, 城市:', Object.keys(C).length);
      return;
    }
  } catch (e) { console.log('静态JSON加载失败:', e.message); }
}

function mergeData(data) {
  if (data.provinces) {
    for (var k in data.provinces) {
      if (data.provinces[k] && data.provinces[k].n) {
        D[k] = Object.assign(D[k] || {}, data.provinces[k]);
      }
    }
  }
  if (data.cities) {
    for (var k in data.cities) {
      if (data.cities[k] && data.cities[k].n) {
        C[k] = Object.assign(C[k] || {}, data.cities[k]);
      }
    }
  }
}

// ========== 地图渲染 ==========
function setMapMode(mode){
  currentMode=mode;
  // 更新按钮样式
  document.getElementById('modeProvince').style.fontWeight=mode==='province'?'600':'normal';
  document.getElementById('modeCity').style.fontWeight=mode==='city'?'600':'normal';
  expandedProvinces={};
  expandedCities={};
  if(mode==='province'){
    if(chinaGeo)renderAll();
  }else if(mode==='city'){
    if(cityGeo){renderAll();return;}
    fetch('./china_cities.json').then(function(r){
      if(!r.ok)throw Error('');
      return r.json();
    }).then(function(gd){
      cityGeo=gd;
      renderAll();
    }).catch(function(){
      // 降级：尝试阿里云API
      fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full_city.json').then(function(r2){
        if(!r2.ok)throw Error('');
        return r2.json();
      }).then(function(gd2){
        cityGeo=gd2;
        renderAll();
      }).catch(function(){
        // 二次降级：遍历所有省份加载市级数据
        loadAllCitiesGeo();
      });
    });
  }
}

function loadAllCitiesGeo(){
  if(!chinaGeo)return;
  document.getElementById('rightPanelContent').innerHTML='<div class="empty-state"><p>正在加载全国市级数据...</p></div>';
  var muniAdcodes={'110000':1,'120000':1,'310000':1,'500000':1};
  var muniFeats=[],loadAdcodes=[];
  // 提取直辖市省级轮廓 + 其他省 adcode
  for(var i=0;i<chinaGeo.features.length;i++){
    var f=chinaGeo.features[i];
    var a=String(f.properties.adcode||f.properties.id||'');
    var aname=f.properties.name||'';
    // 也按名称匹配兜底
    if((a==='110000'||a==='120000'||a==='310000'||a==='500000')||
       aname==='北京市'||aname==='天津市'||aname==='上海市'||aname==='重庆市'){
      muniFeats.push(f);
    }else if(a&&a.length===6&&a.substring(2)==='0000'){
      loadAdcodes.push(a);
    }
  }
  var allFeats=[],done=0,total=loadAdcodes.length;
  function loadNext(idx){
    if(idx>=total){
      var finalFeats=muniFeats.slice().concat(allFeats);
      cityGeo={type:'FeatureCollection',features:finalFeats};
      renderAll();
      return;
    }
    fetch('https://geo.datav.aliyun.com/areas_v3/bound/'+loadAdcodes[idx]+'_full.json').then(function(r){
      if(r.ok)return r.json();
      return null;
    }).then(function(gd){
      if(gd&&gd.features)allFeats=allFeats.concat(gd.features);
      done++;
      if(done%5===0||done===total){
        document.getElementById('rightPanelContent').innerHTML='<div class="empty-state"><p>加载市级数据 '+done+'/'+total+'...</p></div>';
      }
      loadNext(idx+1);
    }).catch(function(){
      done++;
      loadNext(idx+1);
    });
  }
  if(total>0)loadNext(0);
  else{var finalFeats=muniFeats.slice();cityGeo={type:'FeatureCollection',features:finalFeats};renderAll();}
}



function buildFeatures(){
  var src=currentMode==='city'&&cityGeo?cityGeo:chinaGeo;
  if(!src)return [];
  var feats=[];
  for(var i=0;i<src.features.length;i++)feats.push(src.features[i]);
  for(var prov in expandedProvinces){
    var cfs=expandedProvinces[prov];
    if(cfs&&cfs.length>0){
      // 不替换省级轮廓，追加市级features
      for(var j=0;j<cfs.length;j++)feats.push(cfs[j]);
    }
  }
  for(var city in expandedCities){
    var cdfs=expandedCities[city];
    if(cdfs&&cdfs.length>0){
      // 不替换原始城市feature，只追加区县features（城市轮廓保留，区县叠加）
      for(var k=0;k<cdfs.length;k++)feats.push(cdfs[k]);
    }
  }
  return feats;
}

function expandProvince(pa){
  if(expandedProvinces[pa])return Promise.resolve(expandedProvinces[pa]);
  return fetch('https://geo.datav.aliyun.com/areas_v3/bound/'+pa+'_full.json').then(function(r){if(!r.ok)throw Error('');return r.json();}).then(function(gd){expandedProvinces[pa]=gd.features||[];return expandedProvinces[pa];}).catch(function(){return null;});
}

function expandCity(ca){
  if(expandedCities[ca])return Promise.resolve(expandedCities[ca]);
  return fetch('https://geo.datav.aliyun.com/areas_v3/bound/'+ca+'_full.json').then(function(r){if(!r.ok)throw Error('');return r.json();}).then(function(gd){expandedCities[ca]=gd.features||[];return expandedCities[ca];}).catch(function(){return null;});
}

function renderAll(){
  if(!chart && typeof echarts!=='undefined'){try{chart=echarts.init(document.getElementById('map'));window.addEventListener('resize',function(){if(chart)chart.resize();});}catch(e){}}
  var geoData=currentMode==='city'&&cityGeo?cityGeo:chinaGeo;

  // 即使没有ECharts/GeoJSON，也渲染左侧列表 + 右侧详情
  if(!chart){renderSidebar();return;}
  if(!geoData){
    renderSidebar();
    return;
  }
  var feats=buildFeatures();
  var md={type:'FeatureCollection',features:feats};
  try{echarts.registerMap('m',md);}catch(e){}
  var regions=feats.map(function(f){var p=f.properties||{};return{a:String(p.adcode||p.id||''),n:p.name||''};}).filter(function(r){return r.n;});
  var expandedKeys={};
  for(var p in expandedProvinces){expandedKeys[p]=1;expandedProvinces[p].forEach(function(f){expandedKeys[String(f.properties.adcode||f.properties.id||'')]=1;});}
  for(var c in expandedCities){expandedKeys[c]=1;expandedCities[c].forEach(function(f){expandedKeys[String(f.properties.adcode||f.properties.id||'')]=1;});}
  var data=regions.map(function(r){
    var isExp=!!expandedKeys[r.a];
    var pv=r.a.substring(2)==='0000',ct=(!pv&&r.a.substring(4)==='00');
    var bc,bw;
    var isDark=document.body.classList.contains('dark');
    var expColor=isDark?'#ff6b35':'#e74c3c';
    var ctColor=isDark?'#ffd700':'#e67e22';
    // 选中的区域用展开色突出 + 浅色填充
    var isSelected=(r.a===selectedAdcode);
    if(isSelected){
      var fillColor=isDark?'rgba(255,80,80,0.2)':'rgba(231,76,60,0.15)';
      bc=pv?expColor:ctColor;bw=3.0;
      return {name:r.n,adcode:r.a,itemStyle:{areaColor:fillColor,borderColor:bc,borderWidth:bw}};
    }
    if(isExp){
      bc=pv?expColor:ctColor;
      bw=pv?2.2:1.8;
      // 被展开的省级/市级名称隐藏
      if((pv&&expandedProvinces[r.a])||(ct&&expandedCities[r.a])){
        return {name:r.n,adcode:r.a,itemStyle:{borderColor:bc,borderWidth:bw},label:{show:true,fontSize:0,color:'transparent'}};
      }
    }else{
      if(pv){bc='rgba(44,62,80,0.55)';bw=2.0;}
      else if(ct){bc='rgba(52,73,94,0.4)';bw=1.5;}
      else{bc='rgba(60,80,120,0.25)';bw=0.8;}
    }
    return {name:r.n,adcode:r.a,itemStyle:{borderColor:bc,borderWidth:bw}};
  });
  try{echarts.registerMap('m',{type:'FeatureCollection',features:feats});}catch(e){}
  // 读取当前用户视角
  var curCenter=null;var curZoom=null;
  try{var opt=chart.getOption();if(opt&&opt.series&&opt.series[0]){if(opt.series[0].zoom!=null)curZoom=opt.series[0].zoom;if(opt.series[0].center)curCenter=opt.series[0].center;}}catch(e){}
  var isDark=document.body.classList.contains('dark');
  var bgColor=isDark?'#0d1117':'#ADD8E6';
  var areaColor=isDark?'#2d333b':'#ADD8E6';
  var areaEmphasis=isDark?'#444c56':'#87CEEB';
  var borderColor=isDark?'rgba(139,148,158,0.6)':'rgba(44,62,80,0.5)';
  var emphasisBorder=isDark?'#58a6ff':'#4a5070';
  var labelColor=isDark?'#c9d1d9':'#1a1a2e';
  chart.setOption({
    backgroundColor:bgColor,
    tooltip:{trigger:'item',backgroundColor:isDark?'rgba(22,27,34,0.96)':'rgba(255,255,255,0.96)',borderColor:isDark?'#30363d':'#c8cce0',borderWidth:1,textStyle:{color:isDark?'#c9d1d9':'#1a1a2e',fontSize:13},formatter:function(p){if(!p.data)return'';return'<b>'+p.name+'</b>';}},

    series:[{type:'map',map:'m',roam:true,center:curCenter||[104,35],zoom:curZoom||4,selectedMode:false,
      label:{show:showLabels,color:labelColor,fontSize:Math.max(6,Math.round(7+currentZoom*0.8)),fontWeight:'normal',fontFamily:'SimSun,"宋体",serif',formatter:function(p){return p.name;}},
      itemStyle:{areaColor:areaColor,borderColor:borderColor,borderWidth:1.2},
      emphasis:{label:{color:labelColor,fontWeight:'bold',fontSize:Math.max(8,Math.round(9+currentZoom*0.8))},itemStyle:{areaColor:areaEmphasis,borderColor:emphasisBorder,borderWidth:2}},
      data:data,animationDuration:0
    }]
  },true);
  chart.off('click');
  chart.on('click',function(p){if(!p.data||!p.data.adcode)return;console.log('click adcode:',p.data.adcode);handleClick(String(p.data.adcode),p.name);});
  bc();
  renderSidebar();
}

function renderSidebar(){
  var src=currentMode==='city'&&cityGeo?cityGeo:chinaGeo;
  var modeLabels={'province':'省级','city':'地级市'};
  var allP=[];
  if(src){
    for(var i=0;i<src.features.length;i++){var pf=src.features[i],pa=String(pf.properties.adcode||pf.properties.id||''),pn=pf.properties.name||'';if(pn)allP.push({a:pa,n:pn});}
  }
  // 城市模式：从API数据补充GeoJSON中没有的城市
  if(currentMode==='city'){
    var seen={};
    for(var i=0;i<allP.length;i++)seen[allP[i].a]=1;
    for(var k in C){
      if(!seen[k]&&C[k]&&C[k].n){
        allP.push({a:k,n:C[k].n});
      }
    }
  }
  document.getElementById('leftPanelTitle').textContent=modeLabels[currentMode]+'列表';
  document.getElementById('leftPanelBadge').textContent=modeLabels[currentMode];
  var ph='<div class="list-title">所有'+(currentMode==='province'?'省份':'城市')+' <span>('+allP.length+')</span></div>';
  for(var i=0;i<allP.length;i++){var pv=allP[i],dd=D[pv.a]||C[pv.a],sub='';if(dd){var parts=[];if(dd.p)parts.push('人口 '+dd.p);if(dd.a)parts.push('面积 '+dd.a);if(!parts.length&&dd.sec)parts.push('书记 '+dd.sec);if(!parts.length&&dd.gov)parts.push('市长 '+dd.gov);sub=parts.join(' / ');}var ie=!!expandedProvinces[pv.a];var iec=!!expandedCities[pv.a];ph+='<div class="area-item'+(ie||iec?' expanded':'')+'" onclick="handleClick(\''+pv.a+'\',\''+pv.n+'\')" style="'+(ie||iec?'border-color:#4a5070;background:#f0f2f6;':'')+'"><div class="ai-name">'+(ie||iec?'&#9660; ':'&#9654; ')+pv.n+'</div>'+(sub?'<div class="ai-sub">'+sub+'</div>':'')+'</div>';
    // 如果该省份已展开，列出下辖市
    if(ie&&expandedProvinces[pv.a]){
      var cfs=expandedProvinces[pv.a];
      for(var ci=0;ci<cfs.length;ci++){
        var cf=cfs[ci],ca2=String(cf.properties.adcode||cf.properties.id||''),cn2=cf.properties.name||'';
        if(cn2&&ca2!==pv.a){var dd2=C[ca2],sub2='';if(dd2)sub2='人口 '+dd2.p+' / 面积 '+dd2.a;ph+='<div class="area-item" style="padding:8px 14px 8px 28px;border-color:transparent;margin-bottom:2px" onclick="handleClick(\''+ca2+'\',\''+cn2+'\')"><div class="ai-name" style="font-size:13px">'+cn2+'</div>'+(sub2?'<div class="ai-sub" style="font-size:11px">'+sub2+'</div>':'')+'</div>';}
      }
    }
    // 如果该城市已展开，列出下辖区县
    if(iec&&expandedCities[pv.a]){
      var cdfs=expandedCities[pv.a];
      for(var ci2=0;ci2<cdfs.length;ci2++){
        var cdf=cdfs[ci2],ca3=String(cdf.properties.adcode||cdf.properties.id||''),cn3=cdf.properties.name||'';
        if(cn3&&ca3!==pv.a){ph+='<div class="area-item" style="padding:8px 14px 8px 28px;border-color:transparent;margin-bottom:2px" onclick="handleClick(\''+ca3+'\',\''+cn3+'\')"><div class="ai-name" style="font-size:13px">'+cn3+'</div></div>';}
      }
    }
  }
  document.getElementById('leftPanelContent').innerHTML=ph;
  cachedListHtml=ph;
  document.getElementById('searchInput').value='';
  document.getElementById('searchInput').placeholder=currentMode==='province'?'搜索省份...':'搜索城市...';
}

function toggleProvince(a,n){
  var pa=a.substring(0,2)+'0000';
  showDetail(a,n,'province');
  // 直辖市不展开，但需要清理其他展开省份
  var muni={'110000':1,'120000':1,'310000':1,'500000':1};
  if(muni[pa]){
    for(var p in expandedProvinces){delete expandedProvinces[p];}
    for(var c in expandedCities){delete expandedCities[c];}
    renderAll();
    return;
  }
  if(expandedProvinces[pa]){
    delete expandedProvinces[pa];
    for(var c in expandedCities){if(c.substring(0,2)===pa.substring(0,2))delete expandedCities[c];}
    renderAll();
    return;
  }
  // 清除其他展开的省份
  for(var p in expandedProvinces){delete expandedProvinces[p];}
  for(var c in expandedCities){delete expandedCities[c];}
  expandProvince(pa).then(function(){renderAll();});
}

function handleClick(ca,cn){
  var ip=(ca.substring(2)==='0000'),pa=ca.substring(0,2)+'0000';
  if(currentMode==='province'){
    console.log('省级点击:',ca,cn,'ip:',ip);
    selectedAdcode=ca;
    if(ip){
      toggleProvince(ca,cn);
    }else{
      showDetail(ca,cn,'city');
      renderAll();
    }
    return;
  }
  // 市级模式
  if(currentMode==='city'){
    selectedAdcode=ca;
    var muni={'110000':1,'120000':1,'310000':1,'500000':1};
    var isCity=(ca.substring(2)!=='00'&&ca.substring(4)==='00');
    var isMuni=!!muni[ca];
    if(isCity||isMuni){
      showDetail(ca,cn,'city');
      if(expandedCities[ca]){
        delete expandedCities[ca];renderAll();
      }else{
        for(var cc in expandedCities){delete expandedCities[cc];}
        expandCity(ca).then(function(){renderAll();});
      }
      return;
    }
    // 点击区县：只选中，不展开
    showDetail(ca,cn,'city');
    renderAll();
    return;
  }
}

async function toHome(){
  // 先加载API数据
  await loadApiData();
  try{
    var r=await fetch('./china_provinces.json');
    if(!r.ok)throw Error('');
    chinaGeo=await r.json();
    currentZoom=1.0;
    currentMode='province';
    document.getElementById('modeProvince').style.fontWeight='600';
  }catch(e){
    console.log('省级GeoJSON加载失败，尝试阿里云API...',e);
    // 降级：尝试阿里云API
    try{
      var r2=await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
      if(!r2.ok)throw Error('');
      chinaGeo=await r2.json();
      currentZoom=1.0;
      currentMode='province';
      document.getElementById('modeProvince').style.fontWeight='600';
      try{renderAll();}catch(e2){}
      return;
    }catch(e2){
      console.log('GeoJSON全部加载失败，显示数据列表模式');
      currentMode='city';
      document.getElementById('modeCity').style.fontWeight='600';
      document.getElementById('modeProvince').style.fontWeight='normal';
      cityGeo=null;
    }
  }
  try{renderAll();}catch(e){console.log('渲染异常:',e);}
}
document.addEventListener('DOMContentLoaded',function(){document.body.classList.add('dark');document.getElementById('darkToggle').textContent='☀️ 亮色';toHome();});

var showLabels=true;
var cachedListHtml='';
var compareMode=false;
var compareItems=[];
var compareChart=null;
function toggleHistory(){
  var el=document.getElementById('rightPanelContent');
  document.getElementById('rightPanelTitle').textContent='更新记录';
  document.getElementById('rightPanelBadge').textContent='--';
  el.innerHTML='<div class="empty-state"><p>正在加载...</p></div>';
  fetch(apiBase+'/api/history').then(function(r){return r.json();}).then(function(json){
    if(json.code!==0||!json.data||json.data.length===0){
      el.innerHTML='<div class="empty-state"><p>暂无更新记录</p></div>';return;
    }
    var html='';
    for(var i=0;i<json.data.length;i++){
      var h=json.data[i];
      var typeClass='hi-info';
      if(h.type.indexOf('success')>=0)typeClass='hi-success';
      else if(h.type.indexOf('error')>=0||h.type.indexOf('fail')>=0)typeClass='hi-error';
      else if(h.type.indexOf('start')>=0)typeClass='hi-start';
      var d=new Date(h.time);
      var ts=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours()+':'+d.getMinutes()+':'+d.getSeconds();
      var typeLabel=h.type.replace('scrape_','').replace('auto_','自动').replace('server_','系统');
      html+='<div class="history-item"><span class="hi-type '+typeClass+'">'+typeLabel+'</span><span class="hi-time">'+ts+'</span><div class="hi-detail">'+(h.details||'')+'</div>';
      // 显示来源网址
      if(h.source && h.source.length>0){
        for(var si=0;si<h.source.length;si++){
          var src=h.source[si];
          if(typeof src==='string')html+='<div class="hi-detail" style="font-size:11px;color:#4a90d9;word-break:break-all">📎 '+src+'</div>';
          else if(src.url)html+='<div class="hi-detail" style="font-size:11px;color:#4a90d9;word-break:break-all">📎 <a href="'+src.url+'" target="_blank" style="color:#4a90d9">'+src.name+'</a></div>';
        }
      }
      // 显示更新结果列表
      if(h.results && h.results.length>0){
        html+='<div style="margin-top:4px;max-height:100px;overflow-y:auto;font-size:11px">';
        var maxShow=Math.min(h.results.length,30);
        for(var ri=0;ri<maxShow;ri++){
          var r=h.results[ri];
          var detailStr='· '+r.type+' '+r.name;
          if(r.sec)detailStr+=', 书记='+r.sec;
          if(r.gov)detailStr+=', 首长='+r.gov;
          if(r.rd)detailStr+=', 主任='+r.rd;
          if(r.cppcc)detailStr+=', 主席='+r.cppcc;
          if(r.rdDep)detailStr+=', 副主任='+r.rdDep;
          if(r.cppccDep)detailStr+=', 副主席='+r.cppccDep;
          html+='<div style="padding:1px 0;color:#4a5070">'+detailStr+'</div>';
        }
        if(h.results.length>maxShow)html+='<div style="color:#8890a0">...还有'+(h.results.length-maxShow)+'条</div>';
        html+='</div>';
      }
      html+='</div>';
    }
    el.innerHTML=html;
  }).catch(function(){
    el.innerHTML='<div class="empty-state"><p>加载失败</p></div>';
  });
}

function toggleCompare(){
  compareMode=!compareMode;
  var btn=document.getElementById('compareToggle');
  btn.textContent=compareMode?'📊 退出对比':'📊 对比';
  compareItems=[];
  if(compareChart){
    if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});
    else compareChart.dispose();
    compareChart=null;
  }
  document.getElementById('rightPanelTitle').textContent='对比模式';
  document.getElementById('rightPanelBadge').textContent='--';
  document.getElementById('rightPanelContent').innerHTML=compareMode?'<div class="compare-hint">点击两个省份/城市进行对比</div>':'<div class="empty-state"><p>点击地图上的区域查看详情</p></div>';
}
function resetCompare(){
  compareItems=[];
  if(compareChart){
    if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});
    else compareChart.dispose();
    compareChart=null;
  }
  renderCompare();
}
function addCompareItem(a,n,t){
  if(!compareMode)return;
  var d=gd(a,t);
  if(!d)d={n:n,p:'--',a:'--',g:'--'};
  compareItems.push({a:a,n:n,t:t,d:d});
  if(compareItems.length>2)compareItems.shift();
  renderCompare();
}
function renderCompare(){
  var el=document.getElementById('rightPanelContent');
  if(compareItems.length===0){el.innerHTML='<div class="compare-hint">点击两个省份/城市进行对比</div>';if(compareChart){if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});else compareChart.dispose();compareChart=null;}return;}
  if(compareItems.length===1){
    var d=compareItems[0].d;
    el.innerHTML='<div style="padding:12px"><div style="text-align:center;font-size:16px;font-weight:600;margin-bottom:16px;color:'+(document.body.classList.contains('dark')?'#c9d1d9':'#1a1a2e')+'">'+d.n+'</div><div style="text-align:center"><button class="bc-btn" onclick="resetCompare()" style="margin:0 auto">🔄 重置</button></div><div class="compare-hint">请再点击另一个省份/城市</div></div>';
    if(compareChart){if(Array.isArray(compareChart))compareChart.forEach(function(c){c.dispose();});else compareChart.dispose();compareChart=null;}
    return;
  }
  var d1=compareItems[0].d,d2=compareItems[1].d;
  var isDark=document.body.classList.contains('dark');
  var textColor=isDark?'#c9d1d9':'#1a1a2e';
  var barColor1=isDark?'#58a6ff':'#5470c6';
  var barColor2=isDark?'#ff6b35':'#ee6666';
  // 解析数值用于柱状图
  function parseVal(v){
    if(!v||v==='--')return 0;
    var s=v.replace(/[万亿km2万,]/g,'');
    var n=parseFloat(s);
    if(v.indexOf('万')>-1&&v.indexOf('km2')===-1&&v.indexOf('万亿')===-1)n=n*10000;
    if(v.indexOf('万亿')>-1)n=n*10000;
    if(v.indexOf('亿')>-1&&v.indexOf('万亿')===-1)n=n*100000000;
    return n||0;
  }
  var pop1=parseVal(d1.p),pop2=parseVal(d2.p);
  var area1=parseVal(d1.a),area2=parseVal(d2.a);
  var gdp1=parseVal(d1.g),gdp2=parseVal(d2.g);
  el.innerHTML='<div id="comparePop" style="width:100%;height:140px"></div><div id="compareArea" style="width:100%;height:140px"></div><div id="compareGdp" style="width:100%;height:140px"></div><div style="text-align:center;padding:8px"><button class="bc-btn" onclick="resetCompare()">🔄 重置</button></div>';
  if(compareChart)compareChart.dispose();
  compareChart=[];
  function makeChart(id,title,unit,v1,v2){
    var c=echarts.init(document.getElementById(id));
    c.setOption({
      tooltip:{trigger:'item',formatter:function(p){return p.name+'<br/>'+p.seriesName+': '+p.value+' '+unit;}},
      grid:{left:50,right:10,top:30,bottom:25},
      xAxis:{type:'category',data:[d1.n,d2.n],axisLabel:{color:textColor,fontSize:10},name:unit,nameTextStyle:{color:textColor,fontSize:9}},
      yAxis:{type:'value',axisLabel:{color:textColor,fontSize:9,formatter:function(v){return v>=10000?(v/10000).toFixed(1)+'万':v;}}},
      title:{text:title,textStyle:{color:textColor,fontSize:12},left:'center',top:0},
      series:[{type:'bar',data:[{value:v1,itemStyle:{color:barColor1}},{value:v2,itemStyle:{color:barColor2}}],barWidth:20}]
    });
    compareChart.push(c);
  }
  makeChart('comparePop','人口','万人',pop1,pop2);
  makeChart('compareArea','面积','km²',area1,area2);
  makeChart('compareGdp','GDP','亿元',gdp1,gdp2);
}
function searchList(val){
  var el=document.getElementById('leftPanelContent');
  if(!val){el.innerHTML=cachedListHtml;return;}
  var items=el.querySelectorAll('.area-item');
  var kw=val.trim().toLowerCase();
  for(var i=0;i<items.length;i++){
    var txt=items[i].textContent.toLowerCase();
    items[i].style.display=txt.indexOf(kw)>-1?'':'none';
  }
}
function toggleLabels(){
  showLabels=!showLabels;
  var btn=document.getElementById('labelToggle');
  btn.textContent=showLabels?'🏷️ 地名':'🏷️ 隐藏';
  if(chart){renderAll();}
}
function toggleDark(){
  var b=document.body;
  b.classList.toggle('dark');
  var btn=document.getElementById('darkToggle');
  btn.textContent=b.classList.contains('dark')?'☀️ 亮色':'🌙 暗色';
  if(chart){renderAll();}
}
